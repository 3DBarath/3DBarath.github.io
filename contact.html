<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Barath</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <style>
    .contact-wrapper {
      max-width: 500px;
    }
    .contact-title {
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      letter-spacing: -0.04em;
      margin-bottom: 2rem;
    }
    .contact-desc {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 3rem;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .form-control {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 1rem;
      color: var(--text-primary);
      font-family: var(--font-main);
      transition: var(--transition);
    }
    .form-control:focus {
      outline: none;
      border-color: #555555;
      background: #0a0a0a;
    }
    textarea.form-control {
      min-height: 120px;
      resize: vertical;
    }
    .links-grid {
      display: flex;
      gap: 2rem;
      margin-top: 4rem;
      border-top: 1px solid var(--border-color);
      padding-top: 2rem;
    }
    .link-item {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .link-item:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">Barath.</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="menu-toggle">
          <span></span>
          <span></span>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="contact-wrapper animate-up">
      <h1 class="contact-title">Let's connect.</h1>
      <p class="contact-desc">
        I am always open to discussing new opportunities, architecture overviews, and exciting mobile engineering projects.
      </p>

      <form action="#" method="POST" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="hello@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="message">Message</label>
          <textarea id="message" class="form-control" placeholder="Your inquiry..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>

      <div class="links-grid">
        <a href="https://github.com/3dbarath" class="link-item">GitHub</a>
        <a href="#" class="link-item">LinkedIn</a>
        <a href="#" class="link-item">Twitter</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Barath.</p>
    </div>
  </footer>

</body>
</html>
