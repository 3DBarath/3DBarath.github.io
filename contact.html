<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - 3DBarath</title>
  <meta name="description" content="Get in touch with 3DBarath for Android Developer opportunities.">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <style>
    .contact-container {
      max-width: 600px;
      margin: 2rem auto 5rem auto;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .form-control {
      width: 100%;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1rem;
      transition: var(--transition);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
    }
    textarea.form-control {
      min-height: 150px;
      resize: vertical;
    }
    .social-links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 3rem;
    }
    .social-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      cursor: pointer;
      font-family: var(--font-heading);
      font-weight: bold;
      color: var(--text-secondary);
    }
    .social-icon:hover {
      background: var(--primary-color);
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">3D<span>Barath</span></a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="menu-toggle">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="contact-container animate-on-scroll">
      <span class="section-subtitle" style="text-align: center;">Get In Touch</span>
      <h2 class="section-title">Let's Talk Code</h2>
      
      <div class="glass-card">
        <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message feature placeholder!');">
          <div class="form-group">
            <label class="form-label" for="name">Your Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="message">Your Message</label>
            <textarea id="message" class="form-control" placeholder="Tell me about your project or opportunity..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
        </form>
      </div>

      <div class="social-links animate-on-scroll">
        <a href="https://github.com/3dbarath" class="social-icon" title="GitHub">GH</a>
        <a href="#" class="social-icon" title="LinkedIn">IN</a>
        <a href="#" class="social-icon" title="Twitter">TW</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 3DBarath. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
