<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barath — Android Engineer</title>
  <meta name="description" content="Portfolio of Barath, Android Engineer specializing in mobile architecture and Kotlin Multiplatform.">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <style>
    .hero-section {
      min-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 5rem;
    }
    .hero-title {
      font-size: clamp(3rem, 8vw, 6.5rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 2rem;
      max-width: 900px;
    }
    .hero-title span {
      color: #777777;
    }
    .hero-subtitle {
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      color: var(--text-secondary);
      max-width: 600px;
      margin-bottom: 3rem;
      font-weight: 400;
      line-height: 1.5;
    }
    .hero-actions {
      display: flex;
      gap: 1rem;
    }
    /* Simple orbital glow for background depth */
    .glow-orb {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 60%);
      top: -100px;
      right: -200px;
      z-index: -1;
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">Barath.</a>
        <ul class="nav-links">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="menu-toggle">
          <span></span>
          <span></span>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-section container">
      <div class="animate-up">
        <h1 class="hero-title">
          Android Engineer.<br>
          <span>Crafting native scaleable experiences.</span>
        </h1>
        <p class="hero-subtitle">
          Specializing in Kotlin Multiplatform, clean architecture, and highly performant UI engineering for modern mobile applications.
        </p>
        <div class="hero-actions">
          <a href="projects.html" class="btn btn-primary">Discover Work</a>
          <a href="contact.html" class="btn btn-outline">Get in Touch</a>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
