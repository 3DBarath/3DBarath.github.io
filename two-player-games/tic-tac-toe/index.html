<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Duo Play — Barath</title>
    <meta name="description" content="A premium 2-player Tic-Tac-Toe experience. Modern UI, smooth animations, and minimalist design.">
    <link rel="stylesheet" href="../../output.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</head>
<body class="bg-brand-dark text-brand-accent overflow-hidden">
    <div class="noise-bg"></div>

    <nav class="fixed top-0 w-full z-50 glass-panel border-b animate-reveal">
        <div class="container mx-auto px-8 h-16 flex items-center justify-between">
            <a href="../" class="text-xl font-bold tracking-tighter hover:text-brand-muted transition-colors">&larr; Duo Play</a>
            <div class="flex items-center gap-8">
                <button id="theme-toggle" class="p-2 text-brand-muted hover:text-brand-accent transition-colors focus:outline-none" aria-label="Toggle Theme">
                    <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l.707.707M6.343 6.343l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                    </svg>
                    <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                </button>
                <div class="flex items-center gap-4 text-[10px] font-bold uppercase tracking-widest">
                    <span id="player-x-score" class="text-brand-accent">Player X: 0</span>
                    <span class="text-brand-muted">/</span>
                    <span id="player-o-score" class="text-brand-muted">Player O: 0</span>
                </div>
                <button id="reset-btn" class="text-[10px] font-bold uppercase tracking-widest hover:text-brand-accent transition-colors">Reset</button>
            </div>
        </div>
    </nav>

    <main class="h-screen flex flex-col items-center justify-center px-8 relative">
        <div id="status" class="mb-12 text-xs uppercase tracking-[0.5em] font-bold text-brand-muted animate-reveal" style="animation-delay: 100ms;">
            Player X's Turn
        </div>

        <div id="game-board" class="game-board card animate-reveal" style="animation-delay: 200ms;">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <!-- Winning Line Visual -->
        <svg id="winning-svg" class="absolute pointer-events-none inset-0 w-full h-full z-10 opacity-0 transition-opacity duration-500">
            <line id="winning-line" x1="0" y1="0" x2="0" y2="0" stroke="var(--brand-accent)" stroke-width="2" stroke-linecap="round" />
        </svg>

        <div id="winner-overlay" class="fixed inset-0 z-[60] flex flex-col items-center justify-center bg-brand-dark/80 backdrop-blur-xl opacity-0 pointer-events-none transition-all duration-700">
            <h2 id="winner-text" class="text-6xl md:text-8xl font-bold mb-12 tracking-tighter">X Wins!</h2>
            <button id="play-again-btn" class="btn btn-primary">Play Again</button>
        </div>
    </main>

    <!-- Custom Cursor -->
    <div id="custom-cursor" class="fixed top-0 left-0 w-8 h-8 border border-brand-accent rounded-full pointer-events-none z-[100] mix-blend-difference transition-transform duration-100 ease-out hidden md:block"></div>
    <div id="custom-cursor-dot" class="fixed top-0 left-0 w-1 h-1 bg-brand-accent rounded-full pointer-events-none z-[100] mix-blend-difference hidden md:block"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.162.0/three.min.js"></script>
    <script src="../../src/main.js" type="module"></script>
    <script src="script.js"></script>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        function updateIcons() {
            if (document.documentElement.classList.contains('light-theme')) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        updateIcons();

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('light-theme');
            const isLight = document.documentElement.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateIcons();
        });
    </script>
</body>
</html>
